<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0" stop-color="#101a30"/>
      <stop offset="0.55" stop-color="#0a1122"/>
      <stop offset="1" stop-color="#05070f"/>
    </radialGradient>
    <linearGradient id="core" x1="320" y1="300" x2="720" y2="740" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5ff7bd"/>
      <stop offset="0.5" stop-color="#2bd9c7"/>
      <stop offset="1" stop-color="#7a8cff"/>
    </linearGradient>
    <linearGradient id="ring" x1="180" y1="512" x2="844" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7a8cff"/>
      <stop offset="0.5" stop-color="#3df0a6"/>
      <stop offset="1" stop-color="#2bd9c7"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <!-- rounded-square app plate -->
  <rect x="96" y="96" width="832" height="832" rx="196" fill="url(#bg)"/>
  <rect x="96" y="96" width="832" height="832" rx="196" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2"/>

  <!-- lensing ring around the mass -->
  <g transform="rotate(-20 512 512)">
    <ellipse cx="512" cy="512" rx="330" ry="118" fill="none" stroke="url(#ring)" stroke-width="18" stroke-opacity="0.9"/>
    <ellipse cx="512" cy="512" rx="330" ry="118" fill="none" stroke="url(#ring)" stroke-width="42" stroke-opacity="0.14" filter="url(#soft)"/>
  </g>

  <!-- the mass -->
  <circle cx="512" cy="512" r="150" fill="url(#core)"/>
  <circle cx="512" cy="512" r="150" fill="url(#core)" opacity="0.5" filter="url(#soft)"/>
  <ellipse cx="470" cy="464" rx="52" ry="34" fill="#ffffff" opacity="0.35"/>

  <!-- orbiting satellite -->
  <g transform="rotate(-20 512 512)">
    <circle cx="842" cy="512" r="26" fill="#3df0a6"/>
    <circle cx="842" cy="512" r="26" fill="#3df0a6" opacity="0.5" filter="url(#soft)"/>
  </g>
</svg>
