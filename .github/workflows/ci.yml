name: CI

on:
  push:
    branches: [main, "codex/**"]
  pull_request:

jobs:
  frontend:
    name: Frontend — types, tests, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
      - run: npx vite build

  native:
    name: Native — fmt, clippy, tests (Windows)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Stage WebView2 loader resource
        run: ../scripts/stage-webview2-loader.ps1
      - run: cargo fmt --check
      - run: cargo clippy --lib -- -D warnings
      - run: cargo test --lib
